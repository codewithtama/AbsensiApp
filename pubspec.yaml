name: absensi_app
description: "Aplikasi Absensi Karyawan - Offline First"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Local Storage (Hive Community Edition)
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4

  # Dependency Injection
  get_it: ^8.0.3

  # Location & Geofencing
  geolocator: ^13.0.2
  permission_handler: ^11.4.0

  # Security & Auth
  local_auth: ^2.3.0
  safe_device: ^1.1.8
  device_info_plus: ^11.3.3
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Crypto
  bcrypt: ^1.1.3

  # Utilities
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1
  file_picker: ^8.3.7
  google_fonts: ^6.2.1
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_ce_generator: ^1.11.1
  build_runner: ^2.4.14
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
